<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>La Stella | Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #222222 0%, #020202 40%, #000000 100%);
      color: #f5f5f5;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 215, 0, 0.28);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.25), 0 0 60px rgba(0,0,0,0.9) inset;
      pointer-events: none;
      z-index: -1;
    }

    .wrapper { text-align: center; padding: 24px; }

    .logo-wrapper {
      width: 200px;
      height: 200px;
      margin: 0 auto 20px;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 50%;
    }

    .headline {
      font-size: 24px;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    .sub-headline {
      font-size: 14px;
      opacity: 0.88;
    }

    .sub-headline span {
      color: #ffd700;
      font-weight: 600;
    }

    .divider {
      width: 120px;
      height: 1px;
      margin: 18px auto;
      background: linear-gradient(to right, transparent, rgba(255,215,0,0.85), transparent);
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ffd700;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="logo-wrapper">
      <img src="images/lastella-logo.png" alt="La Stella Logo" onerror="this.style.display='none'">
    </div>

    <div class="headline">مرحبًا بكم في لاستيلا</div>
    <div class="sub-headline">Welcome to <span>La&nbsp;Stella</span></div>

    <div class="divider"></div>

    <div class="status">
      <span class="dot"></span>
      <span id="statusText">جارٍ فتح المنيو...</span>
    </div>
  </div>

  <!-- Better: download this file and put it in your GitHub folder -->
  <script src="supabase.min.js"></script>

  <script>
    const BACKUP_URL = "https://kira980.github.io/backup/";
    const SUPABASE_URL = "https://xkwrahcccckmrgiqrhoe.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY_HERE";

    const statusText = document.getElementById("statusText");

    function redirectToBackup() {
      window.location.replace(BACKUP_URL);
    }

    function redirectWithTimeout(url, delay = 600) {
      setTimeout(() => {
        window.location.replace(url);
      }, delay);
    }

    window.onerror = function () {
      redirectToBackup();
    };

    window.onunhandledrejection = function () {
      redirectToBackup();
    };

    async function openMenu() {
      try {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("r");

        if (!slug) {
          redirectToBackup();
          return;
        }

        if (!window.supabase) {
          redirectToBackup();
          return;
        }

        statusText.innerText = "Opening menu...";

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const request = db
          .from("restaurant")
          .select("menu_url, is_active")
          .eq("slug", slug)
          .single();

        const timeout = new Promise((_, reject) => {
          setTimeout(() => reject(new Error("Supabase timeout")), 4000);
        });

        const { data, error } = await Promise.race([
          request,
          timeout
        ]);

        if (error || !data || !data.is_active || !data.menu_url) {
         // redirectToBackup();
          return;
        }

        redirectWithTimeout(data.menu_url, 600);

      } catch (err) {
        console.error("Menu redirect error:", err);
       // redirectToBackup();
      }
    }

    openMenu();
  </script>

</body>
</html>
