<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ניהול תפריט - קל</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#f8f4ee;--panel:#fffdf8;--line:#e5d7c7;--text:#2a1d17;--muted:#76665b;
      --accent:#9b4f24;--accent2:#315f55;--bad:#b4233b;--ok:#22884b;--warn:#b7791f;
      --shadow:0 14px 34px rgba(80,45,20,.12);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Segoe UI",sans-serif;min-height:100vh}
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    .gate{position:fixed;inset:0;background:linear-gradient(135deg,#fff7ec,#edd0ae);display:grid;place-items:center;z-index:20;padding:18px}
    .login{width:min(100%,360px);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
    .login h1{font-size:22px;margin:0 0 14px;color:var(--accent)}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
    label{font-size:12px;color:var(--muted);font-weight:700}
    input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:10px 11px}
    textarea{resize:vertical;min-height:72px}
    .app{display:none}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(248,244,238,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1180px;margin:0 auto;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{min-width:0}
    .brand h1{font-size:22px;margin:0}
    .brand p{font-size:12px;color:var(--muted);margin:3px 0 0}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:0;border-radius:999px;padding:9px 14px;font-weight:800;background:var(--accent);color:#fff}
    .btn.secondary{background:#fff;color:var(--accent);border:1px solid var(--line)}
    .btn.green{background:var(--accent2)}
    .btn.red{background:var(--bad)}
    .btn.small{padding:6px 10px;font-size:12px}
    .layout{max-width:1180px;margin:0 auto;padding:14px;display:grid;grid-template-columns:300px minmax(0,1fr);gap:14px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:14px}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .panel-title{font-size:16px;font-weight:900;color:var(--accent);margin:0}
    .category-editor{padding:0;overflow:hidden}
    .category-editor summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px;cursor:pointer}
    .category-editor summary::-webkit-details-marker{display:none}
    .category-editor-summary{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;color:var(--accent)}
    .category-arrow{display:inline-grid;place-items:center;width:24px;height:24px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--accent);transition:transform .18s ease}
    .category-editor[open] .category-arrow{transform:rotate(180deg)}
    .category-editor-content{border-top:1px solid var(--line);padding:14px}
    .category-editor-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .muted-label{font-size:12px;color:var(--muted);font-weight:700}
    .categories{display:flex;flex-direction:column;gap:7px}
    .cat-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px;text-align:right;color:var(--text)}
    .cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .cat-btn span{display:block;font-size:12px;opacity:.78;margin-top:2px}
    .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .span2{grid-column:1/-1}
    .menu-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 0 10px}
    .items{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .item{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;display:grid;grid-template-columns:minmax(0,1fr) 112px;min-height:128px}
    .item-body{padding:12px;min-width:0}
    .item-title{font-weight:900;font-size:15px;line-height:1.3}
    .item-desc{font-size:12px;color:var(--muted);line-height:1.45;margin:6px 0}
    .item-price{color:var(--accent);font-weight:900}
    .item-img{width:112px;height:100%;background:#f1e4d4;overflow:hidden}
    .item-img img{width:100%;height:100%;display:block}
    .item-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .empty{border:1px dashed var(--line);border-radius:10px;padding:24px;text-align:center;color:var(--muted);background:#fff}
    .status{min-height:20px;font-size:13px;margin-top:10px;color:var(--muted)}
    .status.ok{color:var(--ok)}.status.bad{color:var(--bad)}.status.warn{color:var(--warn)}
    .modal{position:fixed;inset:0;background:rgba(28,18,12,.55);display:none;align-items:center;justify-content:center;z-index:30;padding:14px}
    .modal.open{display:flex}
    .dialog{width:min(100%,620px);max-height:92vh;overflow:auto;background:var(--panel);border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow);padding:16px}
    .dialog-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .dialog h2{font-size:18px;margin:0;color:var(--accent)}
    .image-tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .image-preview{height:190px;border:1px solid var(--line);border-radius:10px;background:#f1e4d4;overflow:hidden;display:none}
    .image-preview img{width:100%;height:100%;display:block}
    .range-row{display:grid;grid-template-columns:1fr 48px;gap:8px;align-items:center}
    .range-row span{font-size:12px;color:var(--muted)}
    @media(max-width:820px){.layout{grid-template-columns:1fr}.items{grid-template-columns:1fr}.editor-grid{grid-template-columns:1fr}.span2{grid-column:auto}}
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <form class="login" id="loginForm">
      <h1>כניסת מנהל</h1>
      <div class="field">
        <label>שם משתמש</label>
        <input id="loginUsername" autocomplete="username" required />
      </div>
      <div class="field">
        <label>סיסמה</label>
        <input id="loginPassword" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" id="loginBtn">כניסה</button>
      <div class="status" id="loginStatus"></div>
    </form>
  </div>

  <div class="app" id="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1 id="restaurantName">ניהול תפריט מאפייה</h1>
          <p>עברית בלבד - קטגוריות ופריטים</p>
        </div>
        <div class="actions">
          <a class="btn secondary" href="index.html?restaurant=slaman" target="_blank">פתיחת התפריט</a>
          <button class="btn secondary" id="reloadBtn" type="button">רענון</button>
          <button class="btn red" id="logoutBtn" type="button">יציאה</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2 class="panel-title">קטגוריות</h2>
          <button class="btn small" id="addCategoryBtn" type="button">+ קטגוריה</button>
        </div>
        <div class="categories" id="categoriesList"></div>
        <div class="status" id="categoryStatus"></div>
      </aside>

      <section>
        <details class="panel category-editor" id="categoryEditor">
          <summary>
            <span class="category-editor-summary">
              <span class="category-arrow">⌄</span>
              <span>עריכת קטגוריה</span>
            </span>
            <span class="muted-label">בשימוש פחות מפריטים</span>
          </summary>
          <div class="category-editor-content">
            <div class="category-editor-actions">
              <button class="btn green small" id="saveCategoryBtn" type="button">שמירת קטגוריה</button>
              <button class="btn red small" id="deleteCategoryBtn" type="button">מחיקת קטגוריה</button>
            </div>
            <div class="editor-grid">
              <div class="field">
                <label>שם קטגוריה</label>
                <input id="catName" />
              </div>
              <div class="field">
                <label>תג קצר</label>
                <input id="catTag" placeholder="לדוגמה: עוגות" />
              </div>
              <div class="field span2">
                <label>תיאור קצר</label>
                <textarea id="catNote"></textarea>
              </div>
            </div>
          </div>
        </details>

        <div class="menu-head">
          <h2 class="panel-title" id="itemsTitle">פריטים</h2>
          <button class="btn" id="addItemBtn" type="button">+ פריט</button>
        </div>
        <div class="items" id="itemsList"></div>
        <div class="status" id="mainStatus"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="itemModal">
    <form class="dialog" id="itemForm">
      <div class="dialog-head">
        <h2 id="itemDialogTitle">פריט חדש</h2>
        <button class="btn secondary small" type="button" id="closeItemModal">סגירה</button>
      </div>
      <div class="editor-grid">
        <div class="field">
          <label>שם פריט</label>
          <input id="itemName" required />
        </div>
        <div class="field">
          <label>מחיר</label>
          <input id="itemPrice" type="number" min="0" step="0.01" />
        </div>
        <div class="field span2">
          <label>תיאור</label>
          <textarea id="itemDesc"></textarea>
        </div>
        <div class="field span2">
          <label>תמונה</label>
          <div class="actions">
            <button class="btn secondary" type="button" id="uploadImageBtn">העלאת תמונה</button>
            <button class="btn secondary" type="button" id="removeImageBtn">הסרת תמונה</button>
          </div>
          <input id="itemImageFile" type="file" accept="image/*" style="display:none" />
          <input id="itemImage" type="hidden" />
          <div class="image-preview" id="imagePreviewBox"><img id="imagePreview" alt=""></div>
          <div class="image-tools">
            <div class="field">
              <label>התאמת תמונה</label>
              <select id="imageFit">
                <option value="cover">מילוי חכם</option>
                <option value="contain">תמונה מלאה</option>
                <option value="fill">מתיחה</option>
              </select>
            </div>
            <div class="field">
              <label>זום</label>
              <div class="range-row"><input id="imageZoom" type="range" min="60" max="200" step="5" value="100"><span id="imageZoomValue">100%</span></div>
            </div>
            <div class="field">
              <label>ימין / שמאל</label>
              <div class="range-row"><input id="imagePosX" type="range" min="0" max="100" step="1" value="50"><span id="imagePosXValue">50%</span></div>
            </div>
            <div class="field">
              <label>למעלה / למטה</label>
              <div class="range-row"><input id="imagePosY" type="range" min="0" max="100" step="1" value="50"><span id="imagePosYValue">50%</span></div>
            </div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn green" type="submit">שמירת פריט</button>
        <button class="btn secondary" type="button" id="cancelItemBtn">ביטול</button>
      </div>
      <div class="status" id="itemStatus"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script>
    const DEFAULT_RESTAURANT_ID = '4927c28a-a89e-4339-9eea-cd97e10bb0ab';
    const DEFAULT_RESTAURANT_SLUG = 'slaman';
    let restaurant = null;
    let categories = [];
    let items = [];
    let activeCategoryId = null;
    let editingItemId = null;

    const els = {
      gate: document.getElementById('gate'),
      app: document.getElementById('app'),
      loginForm: document.getElementById('loginForm'),
      loginUsername: document.getElementById('loginUsername'),
      loginPassword: document.getElementById('loginPassword'),
      loginBtn: document.getElementById('loginBtn'),
      loginStatus: document.getElementById('loginStatus'),
      restaurantName: document.getElementById('restaurantName'),
      categoriesList: document.getElementById('categoriesList'),
      categoryStatus: document.getElementById('categoryStatus'),
      mainStatus: document.getElementById('mainStatus'),
      catName: document.getElementById('catName'),
      catTag: document.getElementById('catTag'),
      catNote: document.getElementById('catNote'),
      itemsTitle: document.getElementById('itemsTitle'),
      itemsList: document.getElementById('itemsList'),
      itemModal: document.getElementById('itemModal'),
      itemForm: document.getElementById('itemForm'),
      itemDialogTitle: document.getElementById('itemDialogTitle'),
      itemName: document.getElementById('itemName'),
      itemPrice: document.getElementById('itemPrice'),
      itemDesc: document.getElementById('itemDesc'),
      itemImage: document.getElementById('itemImage'),
      itemImageFile: document.getElementById('itemImageFile'),
      imagePreviewBox: document.getElementById('imagePreviewBox'),
      imagePreview: document.getElementById('imagePreview'),
      imageFit: document.getElementById('imageFit'),
      imageZoom: document.getElementById('imageZoom'),
      imagePosX: document.getElementById('imagePosX'),
      imagePosY: document.getElementById('imagePosY'),
      imageZoomValue: document.getElementById('imageZoomValue'),
      imagePosXValue: document.getElementById('imagePosXValue'),
      imagePosYValue: document.getElementById('imagePosYValue'),
      itemStatus: document.getElementById('itemStatus')
    };

    function setStatus(el, text, type = '') {
      el.className = 'status ' + type;
      el.textContent = text || '';
    }

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[ch]));
    }

    function getRestaurantSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get('restaurant') || params.get('slug') || '';
    }

    function getRestaurantId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('restaurant_id') || params.get('id') || DEFAULT_RESTAURANT_ID;
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(min, Math.min(max, number));
    }

    function imageStyle(item) {
      const fit = ['cover', 'contain', 'fill'].includes(item?.image_fit) ? item.image_fit : 'cover';
      const zoom = clampNumber(item?.image_zoom, 60, 200, 100);
      const posX = clampNumber(item?.image_pos_x, 0, 100, 50);
      const posY = clampNumber(item?.image_pos_y, 0, 100, 50);
      return `object-fit:${fit};object-position:${posX}% ${posY}%;transform:scale(${zoom / 100});transform-origin:${posX}% ${posY}%;`;
    }

    function currentImageSettings() {
      return {
        fit: ['cover', 'contain', 'fill'].includes(els.imageFit.value) ? els.imageFit.value : 'cover',
        zoom: clampNumber(els.imageZoom.value, 60, 200, 100),
        posX: clampNumber(els.imagePosX.value, 0, 100, 50),
        posY: clampNumber(els.imagePosY.value, 0, 100, 50)
      };
    }

    function syncImagePreview() {
      const url = els.itemImage.value.trim();
      const settings = currentImageSettings();
      els.imageZoomValue.textContent = settings.zoom + '%';
      els.imagePosXValue.textContent = settings.posX + '%';
      els.imagePosYValue.textContent = settings.posY + '%';
      els.imagePreviewBox.style.display = url ? 'block' : 'none';
      els.imagePreview.src = url;
      els.imagePreview.style.cssText = `object-fit:${settings.fit};object-position:${settings.posX}% ${settings.posY}%;transform:scale(${settings.zoom / 100});transform-origin:${settings.posX}% ${settings.posY}%;`;
    }

    async function uploadImage(file) {
      if (!restaurant?.id) throw new Error('לא נטענה מאפייה');
      const maxSourceSize = 12 * 1024 * 1024;
      if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        throw new Error('אפשר להעלות JPG, PNG או WebP בלבד');
      }
      if (file.size > maxSourceSize) {
        throw new Error('התמונה גדולה מדי. אפשר להעלות עד 12MB');
      }
      const compressed = await compressImage(file);
      const path = `salman/${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${compressed.ext}`;
      const { error } = await db.storage
        .from('images')
        .upload(path, compressed.blob, { cacheControl: '3600', contentType: compressed.type, upsert: false });
      if (error) throw error;
      const { data: { publicUrl } } = db.storage.from('images').getPublicUrl(path);
      return publicUrl;
    }

    async function compressImage(file) {
      const maxDimension = 1600;
      const minQuality = 0.62;
      const targetSize = 650 * 1024;
      const source = await loadImageSource(file);
      const scale = Math.min(1, maxDimension / Math.max(source.width, source.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(source.width * scale));
      canvas.height = Math.max(1, Math.round(source.height * scale));
      const ctx = canvas.getContext('2d', { alpha: true });
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
      source.close?.();
      let quality = 0.82;
      let blob = await canvasToBlob(canvas, 'image/webp', quality);
      while (blob.size > targetSize && quality > minQuality) {
        quality = Math.max(minQuality, quality - 0.08);
        blob = await canvasToBlob(canvas, 'image/webp', quality);
      }
      if (file.size <= blob.size) {
        return {
          blob: file,
          type: file.type,
          ext: file.type === 'image/png' ? 'png' : (file.type === 'image/webp' ? 'webp' : 'jpg')
        };
      }
      return { blob, type: 'image/webp', ext: 'webp' };
    }

    async function loadImageSource(file) {
      if ('createImageBitmap' in window) return createImageBitmap(file);
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('לא ניתן לקרוא את התמונה'));
        };
        img.src = url;
      });
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (!blob) reject(new Error('דחיסת התמונה נכשלה'));
          else resolve(blob);
        }, type, quality);
      });
    }

    function getStoragePathFromPublicUrl(url) {
      if (!url) return null;
      try {
        const parsed = new URL(url);
        const marker = '/storage/v1/object/public/images/';
        const markerIndex = parsed.pathname.indexOf(marker);
        if (markerIndex === -1) return null;
        return decodeURIComponent(parsed.pathname.slice(markerIndex + marker.length));
      } catch {
        return null;
      }
    }

    async function removeStoredImage(url) {
      const path = getStoragePathFromPublicUrl(url);
      if (!path) return;
      const { error } = await db.storage.from('images').remove([path]);
      if (error) console.warn('Failed to remove old image:', error.message);
    }

    async function resolveAdminEmail(username) {
      const { data, error } = await db.rpc('admin_email_for_username', {
        login_username: username.trim().toLowerCase()
      });
      if (error) throw error;
      return data || null;
    }

    async function login(username, password) {
      const email = await resolveAdminEmail(username);
      if (!email) throw new Error('שם משתמש לא נמצא');
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }

    async function loadRestaurant() {
      const slug = getRestaurantSlug();
      const restaurantId = getRestaurantId();
      let query = db
        .from('restaurant')
        .select('id,name,slug,is_active')
        .eq('id', restaurantId)
        .eq('is_active', true)
        .limit(1);
      if (slug) {
        query = db
          .from('restaurant')
          .select('id,name,slug,is_active')
          .eq('slug', slug)
          .eq('is_active', true)
          .limit(1);
      }
      const { data, error } = await query.maybeSingle();
      if (error) throw error;
      if (!data) throw new Error('לא נמצאה מאפייה פעילה');
      restaurant = data;
      els.restaurantName.textContent = data.name || 'ניהול תפריט';
    }

    async function loadData() {
      setStatus(els.mainStatus, 'טוען נתונים...', 'warn');
      await loadRestaurant();
      const [catRes, itemRes] = await Promise.all([
        db.from('categories')
          .select('id,name_he,note_he,tag,sort_order,is_active')
          .eq('restaurant_id', restaurant.id)
          .order('sort_order', { ascending: true }),
        db.from('menu_items')
          .select('id,category_id,name_he,description_he,price,price_label,image_url,image_fit,image_zoom,image_pos_x,image_pos_y,is_available,sort_order')
          .eq('restaurant_id', restaurant.id)
          .order('sort_order', { ascending: true })
      ]);
      if (catRes.error) throw catRes.error;
      if (itemRes.error) throw itemRes.error;
      categories = catRes.data || [];
      items = itemRes.data || [];
      activeCategoryId = activeCategoryId && categories.some(c => c.id === activeCategoryId)
        ? activeCategoryId
        : categories[0]?.id || null;
      render();
      setStatus(els.mainStatus, '', '');
    }

    function activeCategory() {
      return categories.find(c => c.id === activeCategoryId) || null;
    }

    function categoryItems() {
      return items.filter(item => item.category_id === activeCategoryId);
    }

    function render() {
      renderCategories();
      renderCategoryEditor();
      renderItems();
    }

    function renderCategories() {
      if (!categories.length) {
        els.categoriesList.innerHTML = '<div class="empty">אין קטגוריות עדיין</div>';
        return;
      }
      els.categoriesList.innerHTML = categories.map(cat => {
        const count = items.filter(item => item.category_id === cat.id).length;
        return `<button class="cat-btn${cat.id === activeCategoryId ? ' active' : ''}" data-cat="${esc(cat.id)}">
          ${esc(cat.name_he || 'ללא שם')}<span>${count} פריטים</span>
        </button>`;
      }).join('');
      els.categoriesList.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategoryId = btn.dataset.cat;
          render();
        });
      });
    }

    function renderCategoryEditor() {
      const cat = activeCategory();
      els.catName.value = cat?.name_he || '';
      els.catTag.value = cat?.tag || '';
      els.catNote.value = cat?.note_he || '';
      els.itemsTitle.textContent = cat ? `פריטים - ${cat.name_he || 'קטגוריה'}` : 'פריטים';
      document.getElementById('saveCategoryBtn').disabled = !cat;
      document.getElementById('deleteCategoryBtn').disabled = !cat;
      document.getElementById('addItemBtn').disabled = !cat;
    }

    function renderItems() {
      const list = categoryItems();
      if (!activeCategoryId) {
        els.itemsList.innerHTML = '<div class="empty">הוסיפו קטגוריה כדי להתחיל</div>';
        return;
      }
      if (!list.length) {
        els.itemsList.innerHTML = '<div class="empty">אין פריטים בקטגוריה הזאת</div>';
        return;
      }
      els.itemsList.innerHTML = list.map(item => {
        const price = item.price_label || (item.price != null ? `₪${Number(item.price).toLocaleString()}` : '');
        return `<article class="item">
          <div class="item-body">
            <div class="item-title">${esc(item.name_he || 'ללא שם')}</div>
            ${item.description_he ? `<div class="item-desc">${esc(item.description_he)}</div>` : ''}
            <div class="item-price">${esc(price)}</div>
            <div class="item-actions">
              <button class="btn secondary small" data-edit="${esc(item.id)}" type="button">עריכה</button>
              <button class="btn red small" data-delete="${esc(item.id)}" type="button">מחיקה</button>
            </div>
          </div>
          <div class="item-img">${item.image_url ? `<img src="${esc(item.image_url)}" alt="" style="${imageStyle(item)}">` : ''}</div>
        </article>`;
      }).join('');
      els.itemsList.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', () => openItem(btn.dataset.edit)));
      els.itemsList.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', () => deleteItem(btn.dataset.delete)));
    }

    async function addCategory() {
      const name = prompt('שם קטגוריה חדשה');
      const trimmed = (name || '').trim();
      if (!trimmed) return;
      setStatus(els.categoryStatus, 'שומר קטגוריה...', 'warn');
      const payload = {
        restaurant_id: restaurant.id,
        name_ar: trimmed,
        name_en: trimmed,
        name_he: trimmed,
        note_ar: '',
        note_en: '',
        note_he: '',
        tag: '',
        sort_order: categories.length + 1,
        is_active: true
      };
      const { data, error } = await db.from('categories').insert(payload).select('id,name_he,note_he,tag,sort_order,is_active').single();
      if (error) throw error;
      categories.push(data);
      activeCategoryId = data.id;
      render();
      setStatus(els.categoryStatus, 'הקטגוריה נוספה', 'ok');
    }

    async function saveCategory() {
      const cat = activeCategory();
      if (!cat) return;
      const name = els.catName.value.trim();
      if (!name) {
        setStatus(els.categoryStatus, 'חובה להזין שם קטגוריה', 'bad');
        return;
      }
      setStatus(els.categoryStatus, 'שומר...', 'warn');
      const payload = {
        name_ar: name,
        name_en: name,
        name_he: name,
        note_ar: els.catNote.value.trim(),
        note_en: els.catNote.value.trim(),
        note_he: els.catNote.value.trim(),
        tag: els.catTag.value.trim()
      };
      const { error } = await db.from('categories')
        .update(payload)
        .eq('id', cat.id)
        .eq('restaurant_id', restaurant.id);
      if (error) throw error;
      Object.assign(cat, { name_he: payload.name_he, note_he: payload.note_he, tag: payload.tag });
      render();
      setStatus(els.categoryStatus, 'הקטגוריה נשמרה', 'ok');
    }

    async function deleteCategory() {
      const cat = activeCategory();
      if (!cat) return;
      const count = categoryItems().length;
      if (!confirm(`למחוק את הקטגוריה "${cat.name_he || 'קטגוריה'}" ואת ${count} הפריטים שבתוכה?`)) return;
      setStatus(els.categoryStatus, 'מוחק קטגוריה...', 'warn');
      const itemDelete = await db.from('menu_items')
        .delete()
        .eq('restaurant_id', restaurant.id)
        .eq('category_id', cat.id);
      if (itemDelete.error) throw itemDelete.error;
      const categoryDelete = await db.from('categories')
        .delete()
        .eq('restaurant_id', restaurant.id)
        .eq('id', cat.id);
      if (categoryDelete.error) throw categoryDelete.error;
      categories = categories.filter(row => row.id !== cat.id);
      items = items.filter(row => row.category_id !== cat.id);
      activeCategoryId = categories[0]?.id || null;
      render();
      setStatus(els.categoryStatus, 'הקטגוריה נמחקה', 'ok');
    }

    function openItem(itemId = null) {
      editingItemId = itemId;
      const item = items.find(row => row.id === itemId);
      els.itemDialogTitle.textContent = item ? 'עריכת פריט' : 'פריט חדש';
      els.itemName.value = item?.name_he || '';
      els.itemPrice.value = item?.price ?? '';
      els.itemDesc.value = item?.description_he || '';
      els.itemImage.value = item?.image_url || '';
      els.imageFit.value = ['cover', 'contain', 'fill'].includes(item?.image_fit) ? item.image_fit : 'cover';
      els.imageZoom.value = clampNumber(item?.image_zoom, 60, 200, 100);
      els.imagePosX.value = clampNumber(item?.image_pos_x, 0, 100, 50);
      els.imagePosY.value = clampNumber(item?.image_pos_y, 0, 100, 50);
      syncImagePreview();
      setStatus(els.itemStatus, '', '');
      els.itemModal.classList.add('open');
    }

    function closeItem() {
      els.itemModal.classList.remove('open');
      editingItemId = null;
      els.itemForm.reset();
      els.itemImage.value = '';
      els.imageFit.value = 'cover';
      els.imageZoom.value = '100';
      els.imagePosX.value = '50';
      els.imagePosY.value = '50';
      syncImagePreview();
    }

    async function saveItem(event) {
      event.preventDefault();
      const name = els.itemName.value.trim();
      if (!name || !activeCategoryId) return;
      setStatus(els.itemStatus, 'שומר...', 'warn');
      const priceValue = els.itemPrice.value === '' ? null : Number(els.itemPrice.value);
      const payload = {
        restaurant_id: restaurant.id,
        category_id: activeCategoryId,
        name_ar: name,
        name_en: name,
        name_he: name,
        description_ar: els.itemDesc.value.trim(),
        description_en: els.itemDesc.value.trim(),
        description_he: els.itemDesc.value.trim(),
        price: Number.isFinite(priceValue) ? priceValue : null,
        price_label: '',
        image_url: els.itemImage.value.trim(),
        image_fit: currentImageSettings().fit,
        image_zoom: currentImageSettings().zoom,
        image_pos_x: currentImageSettings().posX,
        image_pos_y: currentImageSettings().posY,
        is_available: true,
        sort_order: editingItemId ? (items.find(i => i.id === editingItemId)?.sort_order || 1) : categoryItems().length + 1
      };
      if (editingItemId) {
        const oldItem = items.find(row => row.id === editingItemId);
        const oldImageUrl = oldItem?.image_url || '';
        const { error } = await db.from('menu_items')
          .update(payload)
          .eq('id', editingItemId)
          .eq('restaurant_id', restaurant.id);
        if (error) throw error;
        if (oldImageUrl && oldImageUrl !== payload.image_url) {
          await removeStoredImage(oldImageUrl);
        }
      } else {
        const { data, error } = await db.from('menu_items')
          .insert(payload)
        .select('id,category_id,name_he,description_he,price,price_label,image_url,image_fit,image_zoom,image_pos_x,image_pos_y,is_available,sort_order')
          .single();
        if (error) throw error;
        items.push(data);
      }
      await loadData();
      closeItem();
      setStatus(els.mainStatus, 'הפריט נשמר', 'ok');
    }

    async function deleteItem(itemId) {
      const item = items.find(row => row.id === itemId);
      if (!item || !confirm(`למחוק את "${item.name_he || 'הפריט'}"?`)) return;
      const oldImageUrl = item.image_url || '';
      const { error } = await db.from('menu_items')
        .delete()
        .eq('id', itemId)
        .eq('restaurant_id', restaurant.id);
      if (error) throw error;
      if (oldImageUrl) await removeStoredImage(oldImageUrl);
      items = items.filter(row => row.id !== itemId);
      renderItems();
      setStatus(els.mainStatus, 'הפריט נמחק', 'ok');
    }

    els.loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      els.loginBtn.disabled = true;
      setStatus(els.loginStatus, 'מתחבר...', 'warn');
      try {
        await login(els.loginUsername.value, els.loginPassword.value);
        els.gate.style.display = 'none';
        els.app.style.display = 'block';
        await loadData();
      } catch (error) {
        setStatus(els.loginStatus, error.message, 'bad');
      } finally {
        els.loginBtn.disabled = false;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut();
      location.reload();
    });
    document.getElementById('reloadBtn').addEventListener('click', () => loadData().catch(error => setStatus(els.mainStatus, error.message, 'bad')));
    document.getElementById('addCategoryBtn').addEventListener('click', () => addCategory().catch(error => setStatus(els.categoryStatus, error.message, 'bad')));
    document.getElementById('saveCategoryBtn').addEventListener('click', () => saveCategory().catch(error => setStatus(els.categoryStatus, error.message, 'bad')));
    document.getElementById('deleteCategoryBtn').addEventListener('click', () => deleteCategory().catch(error => setStatus(els.categoryStatus, error.message, 'bad')));
    document.getElementById('addItemBtn').addEventListener('click', () => openItem());
    document.getElementById('closeItemModal').addEventListener('click', closeItem);
    document.getElementById('cancelItemBtn').addEventListener('click', closeItem);
    document.getElementById('uploadImageBtn').addEventListener('click', () => els.itemImageFile.click());
    document.getElementById('removeImageBtn').addEventListener('click', () => {
      els.itemImage.value = '';
      syncImagePreview();
    });
    els.itemImageFile.addEventListener('change', async () => {
      const file = els.itemImageFile.files[0];
      els.itemImageFile.value = '';
      if (!file) return;
      setStatus(els.itemStatus, 'מעלה תמונה...', 'warn');
      try {
        els.itemImage.value = await uploadImage(file);
        syncImagePreview();
        setStatus(els.itemStatus, 'התמונה הועלתה', 'ok');
      } catch (error) {
        setStatus(els.itemStatus, error.message, 'bad');
      }
    });
    [els.imageFit, els.imageZoom, els.imagePosX, els.imagePosY].forEach(input => {
      input.addEventListener('input', syncImagePreview);
    });
    els.itemModal.addEventListener('click', event => {
      if (event.target === els.itemModal) closeItem();
    });
    els.itemForm.addEventListener('submit', event => saveItem(event).catch(error => setStatus(els.itemStatus, error.message, 'bad')));

    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        els.gate.style.display = 'none';
        els.app.style.display = 'block';
        await loadData().catch(error => setStatus(els.mainStatus, error.message, 'bad'));
      }
    })();
  </script>
</body>
</html>
